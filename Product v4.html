<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>檔期商品收藏簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EEDF;
    --paper-line:#E3D9C0;
    --paper-deep:#ECE4CF;
    --ink:#1F3352;
    --ink-soft:#4B5A72;
    --meta:#8A8272;
    --red:#B23A2E;
    --red-deep:#8E2C22;
    --card-bg:#FBF8EF;
    --shadow: 0 1px 0 rgba(31,51,82,0.06);
    --radius: 3px;
    --c1:#D98A9E; --c2:#5C8A72; --c3:#C08A3E; --c4:#7A5178;
    --c5:#5B87A8; --c6:#C06B3E; --c7:#445A87; --c8:#7C8A4E;
    --gold:#A8791E; --gold-bg:#FBF1D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    background:
      repeating-linear-gradient(180deg, transparent, transparent 35px, var(--paper-line) 35px, var(--paper-line) 36px),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  .app{ max-width:1240px; margin:0 auto; padding:28px 24px 60px; }

  /* ===== Header ===== */
  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px; margin-bottom:22px; flex-wrap:wrap; gap:14px;
  }
  .title-block{ display:flex; align-items:baseline; gap:14px; }
  h1{
    font-family:'Noto Serif TC', serif; font-weight:900; font-size:26px;
    margin:0; letter-spacing:.04em;
  }
  .subtitle{ font-size:12.5px; color:var(--meta); letter-spacing:.05em; }
  .stamp-count{
    font-size:11px; color:var(--meta); border:1px solid var(--paper-line);
    padding:3px 10px; border-radius:20px; background:var(--card-bg);
  }
  .btn{
    font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius);
    padding:10px 18px; font-size:13.5px; font-weight:700; letter-spacing:.03em;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--red); color:#FBF3E7; box-shadow:0 2px 0 var(--red-deep); }
  .btn-primary:hover{ background:var(--red-deep); }
  .btn-ghost{ background:transparent; color:var(--ink-soft); border:1px solid var(--paper-line); }
  .btn-ghost:hover{ border-color:var(--ink-soft); }
  .menu-item-btn{
    display:block; width:100%; text-align:left; background:none; border:none; cursor:pointer;
    font-family:inherit; font-size:13px; color:var(--ink-soft); padding:10px 14px;
  }
  .menu-item-btn:hover{ background:var(--paper-deep); color:var(--ink); }
  .menu-item-btn + .menu-item-btn{ border-top:1px solid var(--paper-line); }

  /* ===== Layout ===== */
  .layout{ display:grid; grid-template-columns:220px 1fr; gap:26px; align-items:start; }
  @media(max-width:820px){ .layout{ grid-template-columns:1fr; } }

  /* ===== Sidebar tabs ===== */
  .sidebar{ position:sticky; top:20px; }
  .sidebar-label{
    font-size:11px; color:var(--meta); letter-spacing:.12em; margin:0 0 8px 4px;
    text-transform:uppercase;
  }
  .tab-list{ display:flex; flex-direction:column; gap:5px; margin-bottom:18px; }
  .tab{
    display:flex; align-items:center; gap:8px; cursor:pointer;
    padding:8px 10px 8px 8px; border-radius:0 var(--radius) var(--radius) 0;
    border-left:4px solid transparent; background:transparent;
    font-size:13.5px; color:var(--ink-soft); position:relative;
  }
  .tab:hover{ background:var(--paper-deep); }
  .tab.active{ background:var(--card-bg); border-left-color:var(--ink); color:var(--ink); font-weight:700; box-shadow:var(--shadow); }
  .tab .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .tab .name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tab .cnt{ font-size:11px; color:var(--meta); }
  .tab-del{
    opacity:0; background:none; border:none; color:var(--meta); cursor:pointer;
    font-size:13px; padding:0 2px; line-height:1;
  }
  .tab:hover .tab-del{ opacity:1; }

  .add-campaign{
    display:flex; gap:6px; margin-left:2px;
  }
  .add-campaign input{
    flex:1; min-width:0; font-family:inherit; font-size:12.5px; padding:7px 8px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .add-campaign button{
    border:1px solid var(--ink); background:var(--card-bg); color:var(--ink);
    border-radius:var(--radius); font-size:14px; cursor:pointer; padding:0 10px;
  }
  .theme-chip-list{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .theme-chip{
    font-size:11.5px; padding:4px 10px 4px 12px; border-radius:20px; border:1.3px solid var(--paper-line);
    background:var(--card-bg); color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; gap:5px;
  }
  .theme-chip.active{ font-weight:700; color:#fff; border-color:transparent; }
  .theme-chip .theme-del{ background:none; border:none; padding:0; font-size:11px; color:inherit; opacity:.6; cursor:pointer; }
  .theme-chip .theme-del:hover{ opacity:1; }

  /* ===== Filter row ===== */
  .filter-row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;
  }
  .search-box{
    flex:1; min-width:180px; font-family:inherit; font-size:13.5px; padding:9px 12px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .status-filter{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{
    font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--paper-line);
    background:var(--card-bg); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .chip.active{ border-color:var(--ink); color:var(--ink); font-weight:700; background:var(--paper-deep); }
  .price-filter{ display:flex; align-items:center; gap:5px; }
  .price-filter input{
    width:82px; font-family:inherit; font-size:12.5px; padding:8px 9px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .price-sep{ color:var(--meta); font-size:12px; }

  /* ===== Cards ===== */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;
  }
  .card{
    background:var(--card-bg); border:1px solid var(--paper-line); border-radius:var(--radius);
    box-shadow:var(--shadow); position:relative; overflow:hidden; display:flex; flex-direction:column;
  }
  .card.is-client{
    border:1.5px solid var(--gold);
    box-shadow:0 0 0 3px var(--gold-bg);
  }
  .client-ribbon{
    position:absolute; top:10px; right:-30px; width:120px;
    background:var(--gold); color:#fff; font-size:11px; font-weight:700; letter-spacing:.08em;
    text-align:center; padding:3px 0; transform:rotate(35deg); z-index:2;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  .card-top{ height:5px; display:flex; }
  .card-top span{ flex:1; }
  .card-img{
    height:130px; background:var(--paper-deep); display:flex; align-items:center; justify-content:center;
    overflow:hidden; color:var(--meta); font-size:12px;
  }
  .card-img img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-body{ padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-name{ font-family:'Noto Serif TC', serif; font-weight:700; font-size:15px; line-height:1.35; }
  .card-brand{ font-size:11.5px; color:var(--meta); }
  .card-brand.clickable{ cursor:pointer; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:2px; }
  .card-brand.clickable:hover{ color:var(--ink); }
  .card-price{ font-variant-numeric:tabular-nums; font-size:13.5px; color:var(--ink-soft); }
  .card-tags{ display:flex; gap:5px; flex-wrap:wrap; margin-top:2px; }
  .tag-pill{
    font-size:10.5px; padding:2px 8px; border-radius:20px; color:#fff; opacity:.88;
  }
  .theme-pill{
    font-size:10.5px; padding:1.5px 8px; border-radius:20px; background:transparent;
    border:1.3px solid; font-weight:600;
  }
  .client-toggle-btn{
    position:absolute; top:8px; left:8px; z-index:3; width:26px; height:26px;
    border-radius:50%; border:1.5px solid var(--gold); background:var(--card-bg);
    cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
    opacity:.5; transition:all .2s ease; padding:0;
  }
  .client-toggle-btn:hover{ opacity:1; }
  .client-toggle-btn.active{
    background:var(--gold); opacity:1; box-shadow:0 1px 4px rgba(0,0,0,.25);
  }
  .appear-list{ display:flex; flex-direction:column; gap:3px; margin-top:2px; }
  .appear-list-item{
    font-size:11px; color:var(--ink-soft); line-height:1.5; padding-left:10px; position:relative;
  }
  .appear-list-item::before{ content:"·"; position:absolute; left:0; color:var(--meta); }
  .appear-list-item a{ color:var(--ink-soft); text-decoration:none; border-bottom:1px dotted var(--ink-soft); }
  .appear-list-item a:hover{ color:var(--red); border-color:var(--red); }
  .appear-more{ font-size:11px; color:var(--meta); padding-left:10px; }
  .card-note{ font-size:12px; color:var(--ink-soft); line-height:1.5; }
  .card-foot{
    display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px;
  }
  .status-badge{
    font-size:11px; padding:3px 9px; border-radius:20px; border:1px solid var(--paper-line); color:var(--ink-soft);
  }
  .status-adopted{
    border:2px solid var(--red); color:var(--red); font-weight:700; transform:rotate(-3deg);
    font-family:'Noto Serif TC', serif; letter-spacing:.08em;
  }
  .card-actions{ display:flex; gap:8px; }
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--meta); font-size:14px; padding:2px;
  }
  .icon-btn:hover{ color:var(--ink); }
  .card a.link-btn{ color:var(--ink-soft); text-decoration:none; font-size:12px; border-bottom:1px dotted var(--ink-soft); }
  .card a.link-btn:hover{ color:var(--red); border-color:var(--red); }

  .empty{
    text-align:center; padding:60px 20px; color:var(--meta); font-size:13.5px;
    border:1px dashed var(--paper-line); border-radius:var(--radius); background:var(--card-bg);
  }
  .empty b{ display:block; font-family:'Noto Serif TC',serif; font-size:16px; color:var(--ink); margin-bottom:6px; font-weight:700; }

  /* ===== Modal ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(31,51,82,0.35); display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:50;
  }
  .modal{
    background:var(--paper); border-radius:4px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
    padding:22px 22px 20px; box-shadow:0 12px 40px rgba(0,0,0,0.25); border:1px solid var(--paper-line);
  }
  .modal h2{ font-family:'Noto Serif TC',serif; font-size:18px; margin:0 0 16px; }
  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:12px; color:var(--meta); margin-bottom:5px; letter-spacing:.03em; }
  .field input, .field textarea, .field select{
    width:100%; font-family:inherit; font-size:13.5px; padding:9px 10px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:56px; }
  .tag-select{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag-opt{
    font-size:12px; padding:5px 11px; border-radius:20px; border:1px solid var(--paper-line);
    cursor:pointer; color:var(--ink-soft); background:var(--card-bg);
  }
  .tag-opt.sel{ color:#fff; border-color:transparent; font-weight:700; }
  .status-select{ display:flex; gap:6px; flex-wrap:wrap; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .close-x{ float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--meta); }
  .appear-row{
    display:grid; grid-template-columns:1fr 1.3fr 1.3fr auto; gap:6px; margin-bottom:6px; align-items:center;
  }
  .appear-row input{
    font-family:inherit; font-size:12px; padding:7px 8px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .appear-row .appear-remove{
    background:none; border:none; color:var(--meta); cursor:pointer; font-size:14px; padding:2px 4px;
  }
  .appear-row .appear-remove:hover{ color:var(--red); }
  @media(max-width:560px){ .appear-row{ grid-template-columns:1fr; } }
  .merge-candidate{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 12px; border:1px solid var(--paper-line); border-radius:var(--radius);
    background:var(--card-bg); cursor:pointer; text-align:left;
  }
  .merge-candidate:hover{ border-color:var(--ink); background:var(--paper-deep); }
  .merge-candidate .mc-name{ font-weight:700; font-size:13px; }
  .merge-candidate .mc-meta{ font-size:11px; color:var(--meta); margin-top:2px; }
  .merge-field{ margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--paper-line); }
  .merge-field-label{ font-size:11px; color:var(--meta); letter-spacing:.03em; margin-bottom:6px; }
  .merge-field-opt{
    display:flex; gap:8px; align-items:flex-start; font-size:12.5px; padding:6px 8px; border-radius:var(--radius);
    cursor:pointer; margin-bottom:4px; border:1px solid transparent;
  }
  .merge-field-opt:hover{ background:var(--paper-deep); }
  .merge-field-opt input{ margin-top:2px; width:auto; }
  .merge-field-value{ color:var(--ink); word-break:break-all; }
  .merge-field-empty{ color:var(--meta); font-style:italic; }
  .merge-field-single{ font-size:12.5px; color:var(--ink-soft); padding:2px 0; }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="title-block">
      <h1>檔期商品收藏簿</h1>
      <span class="subtitle">看到就存・提案不漏</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <span class="stamp-count" id="totalCount">共 0 件</span>
      <button class="btn btn-ghost" id="openBulkBtn">整批新增</button>
      <div class="menu-wrap" style="position:relative;">
        <button class="btn btn-ghost" id="dataMenuBtn">匯入／匯出 ▾</button>
        <div id="dataMenu" style="display:none; position:absolute; right:0; top:calc(100% + 6px); background:var(--card-bg); border:1px solid var(--paper-line); border-radius:var(--radius); box-shadow:0 6px 18px rgba(0,0,0,.12); min-width:180px; z-index:40; overflow:hidden;">
          <button class="menu-item-btn" id="exportJsonBtn">匯出備份（JSON）</button>
          <button class="menu-item-btn" id="exportCsvBtn">匯出表格（CSV）</button>
          <button class="menu-item-btn" id="importJsonBtn">匯入備份（JSON）</button>
          <input type="file" id="importFileInput" accept="application/json" style="display:none;">
        </div>
      </div>
      <button class="btn btn-primary" id="openAddBtn">＋ 新增商品</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">檔期分類</div>
      <div class="tab-list" id="tabList"></div>
      <div class="add-campaign">
        <input type="text" id="newCampaignInput" placeholder="新增檔期，如：週年慶">
        <button id="addCampaignBtn">＋</button>
      </div>

      <div class="sidebar-label" style="margin-top:24px;">主題標籤</div>
      <div class="theme-chip-list" id="themeFilterList"></div>
      <div class="add-campaign">
        <input type="text" id="newThemeInput" placeholder="新增主題，如：交換禮物">
        <button id="addThemeBtn">＋</button>
      </div>
    </aside>

    <main>
      <div class="filter-row">
        <input type="text" class="search-box" id="searchBox" placeholder="搜尋商品名稱、品牌或備註...">
        <div class="price-filter">
          <input type="number" id="priceMinInput" placeholder="最低價" min="0">
          <span class="price-sep">－</span>
          <input type="number" id="priceMaxInput" placeholder="最高價" min="0">
        </div>
        <div class="status-filter" id="statusFilter"></div>
        <span class="chip" id="clientOnlyChip" style="border-color:var(--gold); color:var(--gold);">🚩 只看客戶商品</span>
        <span class="chip" id="brandFilterChip" style="display:none; border-color:var(--ink); color:var(--ink); font-weight:700;"></span>
      </div>
      <div class="grid" id="grid"></div>
    </main>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none;">
  <div class="modal">
    <button class="close-x" id="closeModalBtn">✕</button>
    <h2 id="modalTitle">新增商品</h2>
    <div class="field">
      <label>商品名稱 *</label>
      <input type="text" id="fName" placeholder="例：夏日水果禮盒">
    </div>
    <div class="field-row">
      <div class="field">
        <label>品牌</label>
        <input type="text" id="fBrand" placeholder="選填">
      </div>
      <div class="field">
        <label>參考售價</label>
        <input type="text" id="fPrice" placeholder="例：1,280">
      </div>
    </div>
    <div class="field">
      <label>商品連結</label>
      <input type="text" id="fUrl" placeholder="https://...">
    </div>
    <div class="field" style="border:1px dashed var(--paper-line); border-radius:var(--radius); padding:10px 12px; background:var(--paper-deep);">
      <label style="margin-bottom:6px;">自動帶入名稱／品牌／售價／圖片（選填，不需連網）</label>
      <div style="font-size:11px; color:var(--meta); margin-bottom:7px; line-height:1.6;">
        到商品頁按右鍵→「檢視網頁原始碼」→全選（Ctrl/Cmd+A）→複製，貼在下面，再按「解析」。
      </div>
      <textarea id="fSourcePaste" placeholder="在這裡貼上網頁原始碼..." style="min-height:70px; font-size:11px; font-family:monospace;"></textarea>
      <button type="button" class="btn btn-ghost" id="parseSourceBtn" style="margin-top:7px; width:100%;">解析並帶入欄位</button>
      <div id="fetchHint" style="font-size:11px; color:var(--meta); margin-top:6px; display:none;"></div>
    </div>
    <div class="field">
      <label>圖片網址（選填）</label>
      <input type="text" id="fImg" placeholder="https://...jpg">
    </div>
    <div class="field">
      <label style="display:flex; align-items:center; gap:7px; cursor:pointer; color:var(--gold); font-weight:700;">
        <input type="checkbox" id="fIsClient" style="width:auto; accent-color:var(--gold);">
        🚩 這是客戶的商品（非參考／競品）
      </label>
    </div>
    <div class="field">
      <label>所屬檔期（可多選）</label>
      <div class="tag-select" id="fTags"></div>
    </div>
    <div class="field">
      <label>主題標籤（可多選）</label>
      <div class="tag-select" id="fThemeTags"></div>
    </div>
    <div class="field">
      <label>狀態</label>
      <div class="status-select" id="fStatus"></div>
    </div>
    <div class="field">
      <label>備註</label>
      <textarea id="fNote" placeholder="這個為什麼適合、賣點、注意事項..."></textarea>
    </div>
    <div class="field">
      <label>出現紀錄（曾出現在哪些客戶網站／文章）</label>
      <div id="appearList"></div>
      <button type="button" class="btn btn-ghost" id="addAppearBtn" style="width:100%; margin-top:2px;">＋ 新增一筆紀錄</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="deleteBtn" style="display:none; margin-right:auto; color:var(--red); border-color:var(--red);">刪除商品</button>
      <button class="btn btn-ghost" id="cancelBtn">取消</button>
      <button class="btn btn-primary" id="saveBtn">儲存</button>
    </div>
  </div>
</div>

<div class="overlay" id="bulkOverlay" style="display:none;">
  <div class="modal" style="max-width:600px;">
    <button class="close-x" id="closeBulkBtn">✕</button>
    <h2>整批新增商品</h2>
    <div style="font-size:11.5px; color:var(--meta); line-height:1.7; margin-bottom:12px;">
      從 Excel／Google 試算表複製多列資料直接貼上即可（欄位順序：<b>名稱、品牌、售價、連結、備註</b>，用 Tab 分隔）。也可以一行只寫商品名稱，其他欄位留空。
    </div>
    <div class="field">
      <textarea id="bulkPaste" placeholder="夏日水果禮盒	水果本舖	1280	https://...&#10;中秋月餅禮盒	老饕坊	980	https://..." style="min-height:130px; font-family:monospace; font-size:12px;"></textarea>
    </div>
    <div class="field">
      <label>套用到以下所有商品的所屬檔期（可多選，可留空）</label>
      <div class="tag-select" id="bulkTags"></div>
    </div>
    <div class="field">
      <label>套用主題標籤（可多選，可留空）</label>
      <div class="tag-select" id="bulkThemeTags"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>套用狀態</label>
        <div class="status-select" id="bulkStatus"></div>
      </div>
      <div class="field" style="flex:none; align-self:flex-end; padding-bottom:9px;">
        <label style="display:flex; align-items:center; gap:7px; cursor:pointer; color:var(--gold); font-weight:700; margin-bottom:0;">
          <input type="checkbox" id="bulkIsClient" style="width:auto; accent-color:var(--gold);">
          🚩 全部標記為客戶商品
        </label>
      </div>
    </div>
    <div id="bulkPreviewHint" style="font-size:12px; color:var(--meta); margin:4px 0 4px;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="bulkCancelBtn">取消</button>
      <button class="btn btn-primary" id="bulkConfirmBtn">新增全部</button>
    </div>
  </div>
</div>

<div class="overlay" id="mergeOverlay" style="display:none;">
  <div class="modal" style="max-width:580px;">
    <button class="close-x" id="closeMergeBtn">✕</button>
    <h2>合併商品</h2>

    <div id="mergeStep1">
      <div style="font-size:12.5px; color:var(--ink-soft); margin-bottom:10px;">
        要把「<b id="mergeSourceName"></b>」跟哪一件商品合併？
      </div>
      <input type="text" id="mergeSearchInput" class="search-box" placeholder="搜尋商品名稱或品牌..." style="margin-bottom:10px; width:100%;">
      <div id="mergeCandidateList" style="max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:6px;"></div>
    </div>

    <div id="mergeStep2" style="display:none;">
      <div style="font-size:12px; color:var(--ink-soft); line-height:1.6; margin-bottom:14px; background:var(--paper-deep); padding:9px 11px; border-radius:var(--radius);">
        內容相同或其中一邊留白的欄位會自動選好，你可以再調整。<b>所屬檔期、主題標籤、出現紀錄一律自動合併（取聯集），不會遺漏任何一筆。</b>
      </div>
      <div id="mergeFieldsWrap"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="mergeBackBtn">← 重新選擇</button>
        <button class="btn btn-primary" id="mergeConfirmBtn">確認合併</button>
      </div>
    </div>
  </div>
</div>


<script>
const COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)','var(--c8)'];
const RAW_COLORS = ['#D98A9E','#5C8A72','#C08A3E','#7A5178','#5B87A8','#C06B3E','#445A87','#7C8A4E'];
const STATUSES = ['待評估','已提案','已採用','已淘汰'];
const DEFAULT_CAMPAIGNS = ['春節','情人節','母親節','端午','父親節','中元','中秋','雙十','萬聖節','聖誕節','尾牙/年終','週年慶','常態/全年'];
const DEFAULT_THEMES = ['甜點','鹹食','伴手禮','交換禮物','送長輩','送客戶','質感生活提案'];
const STORAGE_KEY = 'campaign-collector-data';

let state = { campaigns: [], themes: [], products: [] };
let activeCampaign = 'all';
let activeStatus = 'all';
let activeThemeFilters = [];
let clientOnly = false;
let brandFilter = null;
let priceMin = null;
let priceMax = null;
let searchTerm = '';
let editingId = null;
let selectedTagsInModal = [];
let selectedThemesInModal = [];
let loaded = false;

function colorFor(name){
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) % 8;
  return { var: COLORS[hash], hex: RAW_COLORS[hash] };
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadData(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="empty">載入中...</div>';
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      state = JSON.parse(res.value);
    } else {
      state = {
        campaigns: DEFAULT_CAMPAIGNS.map(n => ({id: uid(), name: n})),
        themes: DEFAULT_THEMES.map(n => ({id: uid(), name: n})),
        products: []
      };
      await saveData();
    }
  }catch(e){
    state = {
      campaigns: DEFAULT_CAMPAIGNS.map(n => ({id: uid(), name: n})),
      themes: DEFAULT_THEMES.map(n => ({id: uid(), name: n})),
      products: []
    };
  }
  // 回溯相容：舊資料可能沒有 themes / themeTags / appearances 欄位
  state.themes = state.themes || [];
  state.products.forEach(p => {
    p.themeTags = p.themeTags || [];
    p.appearances = p.appearances || [];
  });
  loaded = true;
  renderAll();
}

async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  }catch(e){
    console.error('儲存失敗', e);
  }
}

function renderAll(){
  renderTabs();
  renderThemeFilterList();
  renderStatusFilter();
  renderGrid();
  document.getElementById('totalCount').textContent = `共 ${state.products.length} 件`;
}

function renderThemeFilterList(){
  const wrap = document.getElementById('themeFilterList');
  if(state.themes.length === 0){
    wrap.innerHTML = `<span style="font-size:11px; color:var(--meta);">還沒有主題標籤，新增一個試試</span>`;
    return;
  }
  wrap.innerHTML = state.themes.map(t => {
    const col = colorFor(t.name);
    const active = activeThemeFilters.includes(t.id);
    return `<span class="theme-chip ${active?'active':''}" data-tid="${t.id}" style="${active?`background:${col.hex}`:''}">
        ${escapeHtml(t.name)}
        <button class="theme-del" data-deltheme="${t.id}" title="刪除主題">✕</button>
      </span>`;
  }).join('');
  wrap.querySelectorAll('.theme-chip').forEach(el => {
    el.addEventListener('click', (e) => {
      if(e.target.dataset.deltheme) return;
      const tid = el.dataset.tid;
      if(activeThemeFilters.includes(tid)) activeThemeFilters = activeThemeFilters.filter(t=>t!==tid);
      else activeThemeFilters.push(tid);
      renderThemeFilterList();
      renderGrid();
    });
  });
  wrap.querySelectorAll('[data-deltheme]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.deltheme;
      const t = state.themes.find(x=>x.id===id);
      if(!confirm(`刪除主題標籤「${t.name}」？商品不會被刪除，只會移除此標籤。`)) return;
      state.themes = state.themes.filter(x=>x.id!==id);
      state.products.forEach(p => { p.themeTags = (p.themeTags||[]).filter(t=>t!==id); });
      activeThemeFilters = activeThemeFilters.filter(t=>t!==id);
      await saveData();
      renderAll();
    });
  });
}

function renderTabs(){
  const list = document.getElementById('tabList');
  const counts = {};
  state.products.forEach(p => (p.tags||[]).forEach(t => counts[t] = (counts[t]||0)+1));
  let html = `<div class="tab ${activeCampaign==='all'?'active':''}" data-c="all">
      <span class="dot" style="background:var(--ink-soft)"></span>
      <span class="name">全部</span>
      <span class="cnt">${state.products.length}</span>
    </div>`;
  state.campaigns.forEach(c => {
    const col = colorFor(c.name);
    html += `<div class="tab ${activeCampaign===c.id?'active':''}" data-c="${c.id}">
        <span class="dot" style="background:${col.var}"></span>
        <span class="name">${escapeHtml(c.name)}</span>
        <span class="cnt">${counts[c.id]||0}</span>
        <button class="tab-del" data-del="${c.id}" title="刪除檔期">✕</button>
      </div>`;
  });
  list.innerHTML = html;
  list.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', (e) => {
      if(e.target.dataset.del) return;
      activeCampaign = el.dataset.c;
      renderAll();
    });
  });
  list.querySelectorAll('.tab-del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.del;
      const c = state.campaigns.find(x=>x.id===id);
      if(!confirm(`刪除檔期「${c.name}」？商品不會被刪除，只會移除此標籤。`)) return;
      state.campaigns = state.campaigns.filter(x=>x.id!==id);
      state.products.forEach(p => { p.tags = (p.tags||[]).filter(t=>t!==id); });
      if(activeCampaign===id) activeCampaign='all';
      await saveData();
      renderAll();
    });
  });
}

function renderStatusFilter(){
  const el = document.getElementById('statusFilter');
  let html = `<span class="chip ${activeStatus==='all'?'active':''}" data-s="all">全部狀態</span>`;
  STATUSES.forEach(s => {
    html += `<span class="chip ${activeStatus===s?'active':''}" data-s="${s}">${s}</span>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => { activeStatus = chip.dataset.s; renderAll(); });
  });
}

function parsePriceNumber(str){
  if(!str) return NaN;
  const m = String(str).match(/[\d,]+/);
  if(!m) return NaN;
  return parseInt(m[0].replace(/,/g,''), 10);
}

function renderGrid(){
  const grid = document.getElementById('grid');
  let items = state.products.filter(p => {
    if(activeCampaign!=='all' && !(p.tags||[]).includes(activeCampaign)) return false;
    if(activeStatus!=='all' && p.status!==activeStatus) return false;
    if(clientOnly && !p.isClient) return false;
    if(activeThemeFilters.length && !(p.themeTags||[]).some(t=>activeThemeFilters.includes(t))) return false;
    if(brandFilter && (p.brand||'').trim() !== brandFilter) return false;
    if(priceMin!=null || priceMax!=null){
      const val = parsePriceNumber(p.price);
      if(isNaN(val)) return false;
      if(priceMin!=null && val < priceMin) return false;
      if(priceMax!=null && val > priceMax) return false;
    }
    if(searchTerm){
      const s = searchTerm.toLowerCase();
      const hay = `${p.name} ${p.brand||''} ${p.note||''}`.toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  }).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  if(items.length===0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <b>還沒有商品</b>
      看到適合的檔期商品，隨手按「新增商品」存起來，之後提案就不用重找。
    </div>`;
    return;
  }

  grid.innerHTML = items.map(p => {
    const tags = (p.tags||[]).map(tid => state.campaigns.find(c=>c.id===tid)).filter(Boolean);
    const themeTags = (p.themeTags||[]).map(tid => state.themes.find(t=>t.id===tid)).filter(Boolean);
    const topBar = tags.length ? tags.map(t=>`<span style="background:${colorFor(t.name).hex}"></span>`).join('') : `<span style="background:var(--paper-line)"></span>`;
    const img = p.image
      ? `<img src="${escapeAttr(p.image)}" alt="" onerror="this.parentElement.innerHTML='圖片無法載入'">`
      : '無圖片';
    const statusHtml = p.status==='已採用'
      ? `<span class="status-badge status-adopted">已採用</span>`
      : `<span class="status-badge">${escapeHtml(p.status||'待評估')}</span>`;
    const appearances = p.appearances || [];
    const shownAppear = appearances.slice(0, 2);
    const appearHtml = appearances.length ? `<div class="appear-list">
        ${shownAppear.map(a => {
          const label = [a.site, a.title].filter(Boolean).join(' － ') || a.url || '未命名紀錄';
          return a.url
            ? `<div class="appear-list-item"><a href="${escapeAttr(a.url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a></div>`
            : `<div class="appear-list-item">${escapeHtml(label)}</div>`;
        }).join('')}
        ${appearances.length > 2 ? `<div class="appear-more">還有 ${appearances.length - 2} 筆紀錄...</div>` : ''}
      </div>` : '';
    return `<div class="card ${p.isClient?'is-client':''}" data-id="${p.id}">
      <button class="client-toggle-btn ${p.isClient?'active':''}" data-toggle-client="${p.id}" title="標記為客戶商品">🚩</button>
      ${p.isClient ? '<div class="client-ribbon">客戶商品</div>' : ''}
      <div class="card-top">${topBar}</div>
      <div class="card-img">${img}</div>
      <div class="card-body">
        <div class="card-name">${escapeHtml(p.name)}</div>
        ${p.brand ? `<div class="card-brand clickable" data-brand="${escapeAttr(p.brand)}" title="查看這個品牌的所有商品">${escapeHtml(p.brand)}</div>` : ''}
        ${p.price ? `<div class="card-price">NT$ ${escapeHtml(p.price)}</div>` : ''}
        <div class="card-tags">${tags.map(t=>`<span class="tag-pill" style="background:${colorFor(t.name).hex}">${escapeHtml(t.name)}</span>`).join('')}</div>
        ${themeTags.length ? `<div class="card-tags">${themeTags.map(t=>{ const col=colorFor(t.name); return `<span class="theme-pill" style="border-color:${col.hex}; color:${col.hex};">${escapeHtml(t.name)}</span>`; }).join('')}</div>` : ''}
        ${p.note ? `<div class="card-note">${escapeHtml(p.note)}</div>` : ''}
        ${appearHtml}
        <div class="card-foot">
          ${statusHtml}
          <div class="card-actions">
            ${p.url ? `<a class="link-btn" href="${escapeAttr(p.url)}" target="_blank" rel="noopener">連結 ↗</a>` : ''}
            <button class="icon-btn" data-merge="${p.id}" title="與其他商品合併">⇄</button>
            <button class="icon-btn" data-edit="${p.id}" title="編輯">✎</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openModal(btn.dataset.edit));
  });
  grid.querySelectorAll('[data-merge]').forEach(btn => {
    btn.addEventListener('click', () => openMergeModal(btn.dataset.merge));
  });
  grid.querySelectorAll('[data-toggle-client]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.toggleClient;
      const p = state.products.find(x=>x.id===id);
      if(!p) return;
      p.isClient = !p.isClient;
      await saveData();
      renderGrid();
    });
  });
  grid.querySelectorAll('[data-brand]').forEach(el => {
    el.addEventListener('click', () => {
      brandFilter = el.dataset.brand;
      updateBrandFilterChip();
      renderGrid();
    });
  });
}

function updateBrandFilterChip(){
  const chip = document.getElementById('brandFilterChip');
  if(brandFilter){
    chip.style.display = 'inline-block';
    chip.textContent = `品牌：${brandFilter} ✕`;
  }else{
    chip.style.display = 'none';
    chip.textContent = '';
  }
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s){ return escapeHtml(s); }

/* ===== 出現紀錄（動態列）===== */
function appearRowHtml(a){
  a = a || {};
  return `<div class="appear-row">
    <input type="text" class="appear-site" placeholder="客戶/網站名稱" value="${escapeAttr(a.site||'')}">
    <input type="text" class="appear-url" placeholder="網址" value="${escapeAttr(a.url||'')}">
    <input type="text" class="appear-title" placeholder="文章標題" value="${escapeAttr(a.title||'')}">
    <button type="button" class="appear-remove" title="刪除這筆">✕</button>
  </div>`;
}
function bindAppearRemove(){
  document.querySelectorAll('#appearList .appear-remove').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.appear-row').remove());
  });
}
function renderAppearList(list){
  const wrap = document.getElementById('appearList');
  wrap.innerHTML = (list || []).map(a => appearRowHtml(a)).join('');
  bindAppearRemove();
}
document.getElementById('addAppearBtn').addEventListener('click', () => {
  document.getElementById('appearList').insertAdjacentHTML('beforeend', appearRowHtml({}));
  bindAppearRemove();
});
function collectAppearances(){
  return Array.from(document.querySelectorAll('#appearList .appear-row')).map(row => ({
    site: row.querySelector('.appear-site').value.trim(),
    url: row.querySelector('.appear-url').value.trim(),
    title: row.querySelector('.appear-title').value.trim()
  })).filter(a => a.site || a.url || a.title);
}

/* ===== Modal ===== */
function openModal(id){
  editingId = id || null;
  const p = id ? state.products.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = p ? '編輯商品' : '新增商品';
  document.getElementById('fName').value = p?.name || '';
  document.getElementById('fBrand').value = p?.brand || '';
  document.getElementById('fPrice').value = p?.price || '';
  document.getElementById('fUrl').value = p?.url || '';
  document.getElementById('fImg').value = p?.image || '';
  document.getElementById('fNote').value = p?.note || '';
  document.getElementById('fIsClient').checked = !!p?.isClient;
  document.getElementById('fSourcePaste').value = '';
  document.getElementById('fetchHint').style.display = 'none';
  selectedTagsInModal = p?.tags ? [...p.tags] : [];
  selectedThemesInModal = p?.themeTags ? [...p.themeTags] : [];

  const themeWrap = document.getElementById('fThemeTags');
  if(state.themes.length === 0){
    themeWrap.innerHTML = `<span style="font-size:11.5px; color:var(--meta);">還沒有主題標籤，可以先在左側欄新增</span>`;
  }else{
    themeWrap.innerHTML = state.themes.map(t => {
      const col = colorFor(t.name);
      const sel = selectedThemesInModal.includes(t.id);
      return `<span class="tag-opt ${sel?'sel':''}" data-tid="${t.id}" style="${sel?`background:${col.hex}`:''}">${escapeHtml(t.name)}</span>`;
    }).join('');
    themeWrap.querySelectorAll('.tag-opt').forEach(el => {
      el.addEventListener('click', () => {
        const tid = el.dataset.tid;
        if(selectedThemesInModal.includes(tid)){
          selectedThemesInModal = selectedThemesInModal.filter(t=>t!==tid);
        } else {
          selectedThemesInModal.push(tid);
        }
        const col = colorFor(state.themes.find(t=>t.id===tid).name);
        el.classList.toggle('sel');
        el.style.background = el.classList.contains('sel') ? col.hex : '';
      });
    });
  }

  renderAppearList(p?.appearances || []);

  const tagWrap = document.getElementById('fTags');
  tagWrap.innerHTML = state.campaigns.map(c => {
    const col = colorFor(c.name);
    const sel = selectedTagsInModal.includes(c.id);
    return `<span class="tag-opt ${sel?'sel':''}" data-tid="${c.id}" style="${sel?`background:${col.hex}`:''}">${escapeHtml(c.name)}</span>`;
  }).join('');
  tagWrap.querySelectorAll('.tag-opt').forEach(el => {
    el.addEventListener('click', () => {
      const tid = el.dataset.tid;
      if(selectedTagsInModal.includes(tid)){
        selectedTagsInModal = selectedTagsInModal.filter(t=>t!==tid);
      } else {
        selectedTagsInModal.push(tid);
      }
      const col = colorFor(state.campaigns.find(c=>c.id===tid).name);
      el.classList.toggle('sel');
      el.style.background = el.classList.contains('sel') ? col.hex : '';
    });
  });

  const statusWrap = document.getElementById('fStatus');
  let curStatus = p?.status || '待評估';
  statusWrap.innerHTML = STATUSES.map(s => `<span class="chip ${s===curStatus?'active':''}" data-st="${s}">${s}</span>`).join('');
  statusWrap.dataset.current = curStatus;
  statusWrap.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      statusWrap.dataset.current = el.dataset.st;
      statusWrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      el.classList.add('active');
    });
  });

  document.getElementById('deleteBtn').style.display = p ? 'inline-block' : 'none';
  document.getElementById('overlay').style.display = 'flex';
}

function closeModal(){
  document.getElementById('overlay').style.display = 'none';
  editingId = null;
}

function normalizeName(s){
  return String(s||'').toLowerCase().replace(/[\s\-_,.，。、()（）【】\[\]!！?？:：]/g,'');
}
function normalizeUrl(u){
  if(!u) return '';
  let s = String(u).trim().toLowerCase();
  s = s.replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/+$/,'');
  return s;
}

async function saveProduct(){
  const name = document.getElementById('fName').value.trim();
  if(!name){ alert('請輸入商品名稱'); return; }

  const normalizedName = normalizeName(name);
  const normalizedUrl = normalizeUrl(document.getElementById('fUrl').value.trim());
  const normalizedImg = normalizeUrl(document.getElementById('fImg').value.trim());

  let duplicate = null;
  let matchReasons = [];
  for(const x of state.products){
    if(x.id === editingId) continue;
    const reasons = [];
    if(normalizeName(x.name) === normalizedName) reasons.push('名稱相同');
    if(normalizedUrl && normalizeUrl(x.url) === normalizedUrl) reasons.push('商品連結相同');
    if(normalizedImg && normalizeUrl(x.image) === normalizedImg) reasons.push('圖片網址相同');
    if(reasons.length){
      duplicate = x;
      matchReasons = reasons;
      break;
    }
  }

  if(duplicate){
    const sameProduct = confirm(
      `資料庫中已經有類似商品：「${duplicate.name}」（${matchReasons.join('、')}）。\n\n是否為同一項商品？\n按「確定」＝跳轉到該商品進行編輯（不會新增這筆重複資料）\n按「取消」＝這是不同的商品，繼續新增`
    );
    if(sameProduct){
      closeModal();
      openModal(duplicate.id);
      return;
    }
  }

  const statusWrap = document.getElementById('fStatus');
  const data = {
    id: editingId || uid(),
    name,
    brand: document.getElementById('fBrand').value.trim(),
    price: document.getElementById('fPrice').value.trim(),

/* ===== Local parse of pasted page source (no network calls, works offline) ===== */
function extractOgImage(html){
  const m = html.match(/<meta[^>]+(?:property|name)=["']og:image["'][^>]+content=["']([^"']+)["']/i)
         || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+(?:property|name)=["']og:image["']/i);
  return m ? m[1] : '';
}
function extractMeta(html, prop){
  let m = html.match(new RegExp('<meta[^>]+(?:property|name)=["\']' + prop + '["\'][^>]+content=["\']([^"\']*)["\']', 'i'));
  if(m) return m[1];
  m = html.match(new RegExp('<meta[^>]+content=["\']([^"\']*)["\'][^>]+(?:property|name)=["\']' + prop + '["\']', 'i'));
  return m ? m[1] : '';
}
function decodeEntities(s){
  const ta = document.createElement('textarea');
  ta.innerHTML = s;
  return ta.value;
}
function extractTitle(html){
  const m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
  return m ? decodeEntities(m[1]).trim() : '';
}
function guessPrice(html){
  const plain = html.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g,' ').replace(/\s+/g, ' ');
  const patterns = [
    /(?:售價|價格|特價|售价)\s{0,3}(NT\$?\s?[\d,]+(?:\s*[~\-–]\s*[\d,]+)?)/i,
    /(?:售價|價格|特價|售价)\s{0,3}\$?\s?([\d,]{2,7}(?:\s*[~\-–]\s*[\d,]{2,7})?)/i,
    /NT\$\s?[\d,]{2,7}(?:\s*[~\-–]\s*[\d,]{2,7})?/i,
    /\$\s?[\d,]{2,7}(?:\s*[~\-–]\s*[\d,]{2,7})?/,
    /[\d,]{2,7}\s?元(?:起)?/
  ];
  for(const re of patterns){
    const m = plain.match(re);
    if(m) return (m[1] || m[0]).replace(/\s+/g,' ').trim();
  }
  return '';
}
function parsePastedSource(){
  const raw = document.getElementById('fSourcePaste').value;
  const hint = document.getElementById('fetchHint');
  hint.style.display = 'block';
  if(!raw || raw.trim().length < 50){
    hint.style.color = 'var(--red)';
    hint.textContent = '請先貼上完整的網頁原始碼（右鍵→檢視網頁原始碼→全選複製）。';
    return;
  }
  let name = extractMeta(raw, 'og:title') || extractTitle(raw);
  name = name.split('|')[0].split('-')[0].trim();
  let brand = extractMeta(raw, 'og:site_name');
  const price = guessPrice(raw);
  const image = extractOgImage(raw);

  let gotSomething = false;
  if(name){ document.getElementById('fName').value = decodeEntities(name); gotSomething = true; }
  if(brand){ document.getElementById('fBrand').value = decodeEntities(brand); gotSomething = true; }
  if(price){ document.getElementById('fPrice').value = price.replace(/NT\$?|[$元]/g,'').trim(); gotSomething = true; }
  if(image && !document.getElementById('fImg').value.trim()){ document.getElementById('fImg').value = image; }

  if(gotSomething){
    hint.style.color = 'var(--ink-soft)';
    hint.textContent = '已帶入偵測到的欄位，請再檢查一下是否正確（價格若有區間會抓整段，可自行調整）。';
  } else {
    hint.style.color = 'var(--red)';
    hint.textContent = '這段原始碼裡沒抓到清楚的商品資訊，請手動輸入。';
  }
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function csvEscape(v){
  const s = String(v==null ? '' : v);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

document.getElementById('importFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const imported = JSON.parse(text);
    if(!imported || !Array.isArray(imported.products) || !Array.isArray(imported.campaigns)){
      alert('這個檔案格式看起來不是本工具匯出的備份，無法匯入。');
      return;
    }
    imported.themes = imported.themes || [];
    imported.products.forEach(p => { p.themeTags = p.themeTags || []; p.appearances = p.appearances || []; });
    const replace = confirm(
      `這份備份裡有 ${imported.products.length} 件商品、${imported.campaigns.length} 個檔期分類、${imported.themes.length} 個主題標籤。\n\n按「確定」＝取代目前所有資料\n按「取消」＝合併進目前資料（不會刪除現有內容）`
    );
    if(replace){
      state = imported;
      state.themes = state.themes || [];
      state.products.forEach(p => { p.themeTags = p.themeTags || []; p.appearances = p.appearances || []; });
    }else{
      const nameToId = {};
      state.campaigns.forEach(c => nameToId[c.name] = c.id);
      const idRemap = {};
      (imported.campaigns||[]).forEach(c => {
        if(nameToId[c.name]){ idRemap[c.id] = nameToId[c.name]; }
        else{ state.campaigns.push(c); nameToId[c.name] = c.id; idRemap[c.id] = c.id; }
      });

      const themeNameToId = {};
      state.themes.forEach(t => themeNameToId[t.name] = t.id);
      const themeIdRemap = {};
      (imported.themes||[]).forEach(t => {
        if(themeNameToId[t.name]){ themeIdRemap[t.id] = themeNameToId[t.name]; }
        else{ state.themes.push(t); themeNameToId[t.name] = t.id; themeIdRemap[t.id] = t.id; }
      });

      const existingIds = new Set(state.products.map(p=>p.id));
      (imported.products||[]).forEach(p => {
        p.tags = (p.tags||[]).map(t => idRemap[t] || t);
        p.themeTags = (p.themeTags||[]).map(t => themeIdRemap[t] || t);
        if(!p.id || existingIds.has(p.id)) p.id = uid();
        existingIds.add(p.id);
        state.products.push(p);
      });
    }
    await saveData();
    activeCampaign = 'all'; activeStatus = 'all'; activeThemeFilters = []; clientOnly = false; searchTerm = '';
    brandFilter = null; priceMin = null; priceMax = null;
    document.getElementById('searchBox').value = '';
    document.getElementById('priceMinInput').value = '';
    document.getElementById('priceMaxInput').value = '';
    updateBrandFilterChip();
    renderAll();
    alert('匯入完成！');
  }catch(err){
    alert('匯入失敗，請確認這是有效的 JSON 備份檔。');
  }finally{
    e.target.value = '';
  }
});

/* ===== 合併商品 ===== */
let mergeSourceId = null;
let mergeTargetId = null;
const MERGE_FIELDS = [
  { key: 'name', label: '品名' },
  { key: 'brand', label: '品牌' },
  { key: 'price', label: '售價' },
  { key: 'url', label: '商品連結' },
  { key: 'image', label: '圖片網址' },
  { key: 'note', label: '備註' },
  { key: 'status', label: '狀態' },
  { key: 'isClient', label: '客戶商品' }
];

function mergeFieldDisplay(key, val){
  if(key === 'isClient') return val ? '是' : '否';
  return (val != null && String(val).trim() !== '') ? String(val) : '';
}

function openMergeModal(sourceId){
  mergeSourceId = sourceId;
  mergeTargetId = null;
  const source = state.products.find(x => x.id === sourceId);
  if(!source) return;
  document.getElementById('mergeSourceName').textContent = source.name;

}
function closeMergeModal(){

  mergeSourceId = null;
  mergeTargetId = null;
}
function renderMergeCandidates(filterText){
  const wrap = document.getElementById('mergeCandidateList');
  const s = filterText.trim().toLowerCase();
  const list = state.products.filter(p => {
    if(p.id === mergeSourceId) return false;
    if(!s) return true;
    return `${p.name} ${p.brand||''}`.toLowerCase().includes(s);
  });
  if(list.length === 0){
    wrap.innerHTML = `<div style="font-size:12px; color:var(--meta); padding:10px 0;">找不到符合的商品。</div>`;
    return;
  }
  wrap.innerHTML = list.map(p => `
    <div class="merge-candidate" data-target="${p.id}">
      <div>
        <div class="mc-name">${escapeHtml(p.name)}</div>
        <div class="mc-meta">${escapeHtml(p.brand||'')}${p.price ? ' ・ NT$' + escapeHtml(p.price) : ''}</div>
      </div>
      <span style="font-size:11px; color:var(--meta);">選擇 →</span>
    </div>
  `).join('');
  wrap.querySelectorAll('[data-target]').forEach(el => {
    el.addEventListener('click', () => selectMergeTarget(el.dataset.target));
  });
}
document.getElementById('mergeSearchInput').addEventListener('input', (e) => {
  renderMergeCandidates(e.target.value);
});

function selectMergeTarget(targetId){
  mergeTargetId = targetId;
  document.getElementById('mergeStep1').style.display = 'none';
  document.getElementById('mergeStep2').style.display = 'block';
  renderMergeFields();
}

function renderMergeFields(){
  const source = state.products.find(x => x.id === mergeSourceId);
  const target = state.products.find(x => x.id === mergeTargetId);
  const wrap = document.getElementById('mergeFieldsWrap');
  wrap.innerHTML = MERGE_FIELDS.map(f => {
    const dispA = mergeFieldDisplay(f.key, source[f.key]);
    const dispB = mergeFieldDisplay(f.key, target[f.key]);
    const sameValue = dispA === dispB;
    if(sameValue && dispA === ''){
      // 兩邊都空白，不用顯示這個欄位
      return `<input type="hidden" data-field="${f.key}" value="a">`;
    }
    if(sameValue){
      return `<div class="merge-field">
        <div class="merge-field-label">${f.label}</div>
        <div class="merge-field-single">${escapeHtml(dispA)}</div>
        <input type="hidden" data-field="${f.key}" value="a">
      </div>`;
    }
    const aEmpty = dispA === '';
    const bEmpty = dispB === '';
    const bDefault = aEmpty && !bEmpty;
    return `<div class="merge-field">
      <div class="merge-field-label">${f.label}</div>
      <label class="merge-field-opt">
        <input type="radio" name="mergefield_${f.key}" value="a" ${bDefault?'':'checked'}>
        <span class="${aEmpty?'merge-field-empty':'merge-field-value'}">${aEmpty ? '（空白）' : escapeHtml(dispA)}</span>
      </label>
      <label class="merge-field-opt">
        <input type="radio" name="mergefield_${f.key}" value="b" ${bDefault?'checked':''}>
        <span class="${bEmpty?'merge-field-empty':'merge-field-value'}">${bEmpty ? '（空白）' : escapeHtml(dispB)}</span>
      </label>
    </div>`;
  }).join('');
}

function unionAppearances(listA, listB){
  const seen = new Set();
  const result = [];
  [...(listA||[]), ...(listB||[])].forEach(a => {
    const key = normalizeUrl(a.url) + '|' + normalizeName(a.title) + '|' + normalizeName(a.site);
    if(seen.has(key)) return;
    seen.add(key);
    result.push(a);
  });
  return result;
}

    merged[f.key] = f.key === 'isClient' ? !!rawVal : (rawVal || '');
  });
  merged.tags = Array.from(new Set([...(source.tags||[]), ...(target.tags||[])]));
  merged.themeTags = Array.from(new Set([...(source.themeTags||[]), ...(target.themeTags||[])]));
  merged.appearances = unionAppearances(source.appearances, target.appearances);
  merged.createdAt = Math.min(source.createdAt||Date.now(), target.createdAt||Date.now());

  state.products = state.products.filter(x => x.id !== mergeSourceId && x.id !== mergeTargetId);
  state.products.push(merged);
  await saveData();
  closeMergeModal();
  renderAll();
  alert('已合併為一筆商品，檔期、主題標籤與出現紀錄都已合併保留。');
});

loadData();
</script>
</body>
</html>
