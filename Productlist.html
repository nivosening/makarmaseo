<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>檔期商品收藏簿</title><meta name="description" content="精選 180 件檔期商品，含品牌、售價、規格版本與備註。"><meta property="og:type" content="website"><meta property="og:title" content="檔期商品收藏簿"><meta property="og:description" content="精選 180 件檔期商品，含品牌、售價、規格版本與備註。"><meta property="og:site_name" content="Tancoco 檔期商品收藏簿"><meta property="og:locale" content="zh_TW"><meta property="og:image" content="https://www.wanfuxuan.com.tw/archive/image/aW1hZ2UtMjAyNjA3MTAyMDM3NDEtNC4zNjg3MDYyNzc%3D.png"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="Tancoco 檔期商品收藏簿"><meta name="twitter:description" content="精選 180 件檔期商品，含品牌、售價、規格版本與備註。"><meta name="twitter:image" content="https://www.wanfuxuan.com.tw/archive/image/aW1hZ2UtMjAyNjA3MTAyMDM3NDEtNC4zNjg3MDYyNzc%3D.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"><style>
  :root{
    --paper:#F4EEDF;
    --paper-line:#E3D9C0;
    --paper-deep:#ECE4CF;
    --ink:#1F3352;
    --ink-soft:#4B5A72;
    --meta:#8A8272;
    --red:#B23A2E;
    --red-deep:#8E2C22;
    --card-bg:#FBF8EF;
    --shadow: 0 1px 0 rgba(31,51,82,0.06);
    --radius: 3px;
    --c1:#D98A9E; --c2:#5C8A72; --c3:#C08A3E; --c4:#7A5178;
    --c5:#5B87A8; --c6:#C06B3E; --c7:#445A87; --c8:#7C8A4E;
    --gold:#A8791E; --gold-bg:#FBF1D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    background:
      repeating-linear-gradient(180deg, transparent, transparent 35px, var(--paper-line) 35px, var(--paper-line) 36px),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  .app{ max-width:1240px; margin:0 auto; padding:28px 24px 60px; }

  /* ===== Header ===== */
  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px; margin-bottom:22px; flex-wrap:wrap; gap:14px;
  }
  .title-block{ display:flex; align-items:baseline; gap:14px; }
  h1{
    font-family:'Noto Serif TC', serif; font-weight:900; font-size:26px;
    margin:0; letter-spacing:.04em;
  }
  .subtitle{ font-size:12.5px; color:var(--meta); letter-spacing:.05em; }
  .stamp-count{
    font-size:11px; color:var(--meta); border:1px solid var(--paper-line);
    padding:3px 10px; border-radius:20px; background:var(--card-bg);
  }
  .btn{
    font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius);
    padding:10px 18px; font-size:13.5px; font-weight:700; letter-spacing:.03em;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--red); color:#FBF3E7; box-shadow:0 2px 0 var(--red-deep); }
  .btn-primary:hover{ background:var(--red-deep); }
  .btn-ghost{ background:transparent; color:var(--ink-soft); border:1px solid var(--paper-line); }
  .btn-ghost:hover{ border-color:var(--ink-soft); }
  .menu-item-btn{
    display:block; width:100%; text-align:left; background:none; border:none; cursor:pointer;
    font-family:inherit; font-size:13px; color:var(--ink-soft); padding:10px 14px;
  }
  .menu-item-btn:hover{ background:var(--paper-deep); color:var(--ink); }
  .menu-item-btn + .menu-item-btn{ border-top:1px solid var(--paper-line); }

  /* ===== Layout ===== */
  .layout{ display:grid; grid-template-columns:220px 1fr; gap:26px; align-items:start; }
  @media(max-width:820px){
    .layout{ grid-template-columns:1fr; }
    .sidebar{ position:static !important; top:auto; background:var(--paper); padding-bottom:8px; margin-bottom:4px; border-bottom:2px solid var(--paper-line); }
  }

  /* ===== Sidebar tabs ===== */
  .sidebar{ position:sticky; top:20px; background:var(--paper); z-index:2; }
  .sidebar-label{
    font-size:11px; color:var(--meta); letter-spacing:.12em; margin:0 0 8px 4px;
    text-transform:uppercase;
  }
  .tab-list{ display:flex; flex-direction:column; gap:5px; margin-bottom:18px; }
  .tab{
    display:flex; align-items:center; gap:8px; cursor:pointer;
    padding:8px 10px 8px 8px; border-radius:0 var(--radius) var(--radius) 0;
    border-left:4px solid transparent; background:transparent;
    font-size:13.5px; color:var(--ink-soft); position:relative;
  }
  .tab:hover{ background:var(--paper-deep); }
  .tab.active{ background:var(--card-bg); border-left-color:var(--ink); color:var(--ink); font-weight:700; box-shadow:var(--shadow); }
  .tab .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .tab .name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tab .cnt{ font-size:11px; color:var(--meta); }
  .tab-del{
    opacity:0; background:none; border:none; color:var(--meta); cursor:pointer;
    font-size:13px; padding:0 2px; line-height:1;
  }
  .tab:hover .tab-del{ opacity:1; }

  .add-campaign{
    display:flex; gap:6px; margin-left:2px;
  }
  .add-campaign input{
    flex:1; min-width:0; font-family:inherit; font-size:12.5px; padding:7px 8px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .add-campaign button{
    border:1px solid var(--ink); background:var(--card-bg); color:var(--ink);
    border-radius:var(--radius); font-size:14px; cursor:pointer; padding:0 10px;
  }
  .theme-chip-list{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .theme-chip{
    font-size:11.5px; padding:4px 10px 4px 12px; border-radius:20px; border:1.3px solid var(--paper-line);
    background:var(--card-bg); color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; gap:5px;
  }
  .theme-chip.active{ font-weight:700; color:#fff; border-color:transparent; }
  .theme-chip .theme-del{ background:none; border:none; padding:0; font-size:11px; color:inherit; opacity:.6; cursor:pointer; }
  .theme-chip .theme-del:hover{ opacity:1; }

  /* ===== Filter row ===== */
  .filter-row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;
  }
  .search-box{
    flex:1; min-width:180px; font-family:inherit; font-size:13.5px; padding:9px 12px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .status-filter{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{
    font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--paper-line);
    background:var(--card-bg); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .chip.active{ border-color:var(--ink); color:var(--ink); font-weight:700; background:var(--paper-deep); }
  .price-filter{ display:flex; align-items:center; gap:5px; }
  .price-filter input{
    width:82px; font-family:inherit; font-size:12.5px; padding:8px 9px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .price-sep{ color:var(--meta); font-size:12px; }
  .sort-select{
    font-family:inherit; font-size:12.5px; padding:8px 10px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
    cursor:pointer;
  }

  /* ===== Cards ===== */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;
  }
  .card{
    background:var(--card-bg); border:1px solid var(--paper-line); border-radius:var(--radius);
    box-shadow:var(--shadow); position:relative; overflow:hidden; display:flex; flex-direction:column;
  }
  .card.is-client{
    border:1.5px solid var(--gold);
    box-shadow:0 0 0 3px var(--gold-bg);
  }
  .client-ribbon{
    position:absolute; top:10px; right:-30px; width:120px;
    background:var(--gold); color:#fff; font-size:11px; font-weight:700; letter-spacing:.08em;
    text-align:center; padding:3px 0; transform:rotate(35deg); z-index:2;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  .card-top{ height:5px; display:flex; }
  .card-top span{ flex:1; }
  .card-img{
    height:130px; background:var(--paper-deep); display:flex; align-items:center; justify-content:center;
    overflow:hidden; color:var(--meta); font-size:12px;
  }
  .card-img img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-body{ padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-name{ font-family:'Noto Serif TC', serif; font-weight:700; font-size:15px; line-height:1.35; }
  .card-brand{ font-size:11.5px; color:var(--meta); }
  .card-brand.clickable{ cursor:pointer; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:2px; }
  .card-brand.clickable:hover{ color:var(--ink); }
  .card-price{ font-variant-numeric:tabular-nums; font-size:13.5px; color:var(--ink-soft); }
  .card-tags{ display:flex; gap:5px; flex-wrap:wrap; margin-top:2px; }
  .tag-pill{
    font-size:10.5px; padding:2px 8px; border-radius:20px; color:#fff; opacity:.88;
  }
  .theme-pill{
    font-size:10.5px; padding:1.5px 8px; border-radius:20px; background:transparent;
    border:1.3px solid; font-weight:600;
  }
  .client-toggle-btn{
    position:absolute; top:8px; left:8px; z-index:3; width:26px; height:26px;
    border-radius:50%; border:1.5px solid var(--gold); background:var(--card-bg);
    cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
    opacity:.5; transition:all .2s ease; padding:0;
  }
  .client-toggle-btn:hover{ opacity:1; }
  .client-toggle-btn.active{
    background:var(--gold); opacity:1; box-shadow:0 1px 4px rgba(0,0,0,.25);
  }
  .appear-list{ display:flex; flex-direction:column; gap:3px; margin-top:2px; }
  .appear-list-item{
    font-size:11px; color:var(--ink-soft); line-height:1.5; padding-left:10px; position:relative;
  }
  .appear-list-item::before{ content:"·"; position:absolute; left:0; color:var(--meta); }
  .appear-list-item a{ color:var(--ink-soft); text-decoration:none; border-bottom:1px dotted var(--ink-soft); }
  .appear-list-item a:hover{ color:var(--red); border-color:var(--red); }
  .appear-more{ font-size:11px; color:var(--meta); padding-left:10px; }
  .appear-count-label{ font-size:11px; color:var(--ink-soft); font-weight:700; margin-bottom:1px; }
  .appear-count-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:50%; background:var(--ink-soft); color:#fff;
    font-size:10.5px; font-weight:700; flex:none;
  }
  .card-note{ font-size:12px; color:var(--ink-soft); line-height:1.5; }
  .card-foot{
    display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px;
  }
  .status-badge{
    font-size:11px; padding:3px 9px; border-radius:20px; border:1px solid var(--paper-line); color:var(--ink-soft);
  }
  .status-adopted{
    border:2px solid var(--red); color:var(--red); font-weight:700; transform:rotate(-3deg);
    font-family:'Noto Serif TC', serif; letter-spacing:.08em;
  }
  .card-actions{ display:flex; gap:8px; }
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--meta); font-size:14px; padding:2px;
  }
  .icon-btn:hover{ color:var(--ink); }
  .card a.link-btn{ color:var(--ink-soft); text-decoration:none; font-size:12px; border-bottom:1px dotted var(--ink-soft); }
  .card a.link-btn:hover{ color:var(--red); border-color:var(--red); }

  .empty{
    text-align:center; padding:60px 20px; color:var(--meta); font-size:13.5px;
    border:1px dashed var(--paper-line); border-radius:var(--radius); background:var(--card-bg);
  }
  .empty b{ display:block; font-family:'Noto Serif TC',serif; font-size:16px; color:var(--ink); margin-bottom:6px; font-weight:700; }

  /* ===== Modal ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(31,51,82,0.35); display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:50;
  }
  .modal{
    background:var(--paper); border-radius:4px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
    padding:22px 22px 20px; box-shadow:0 12px 40px rgba(0,0,0,0.25); border:1px solid var(--paper-line);
  }
  .modal h2{ font-family:'Noto Serif TC',serif; font-size:18px; margin:0 0 16px; }
  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:12px; color:var(--meta); margin-bottom:5px; letter-spacing:.03em; }
  .field input, .field textarea, .field select{
    width:100%; font-family:inherit; font-size:13.5px; padding:9px 10px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:56px; }
  .tag-select{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag-opt{
    font-size:12px; padding:5px 11px; border-radius:20px; border:1px solid var(--paper-line);
    cursor:pointer; color:var(--ink-soft); background:var(--card-bg);
  }
  .tag-opt.sel{ color:#fff; border-color:transparent; font-weight:700; }
  .status-select{ display:flex; gap:6px; flex-wrap:wrap; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .close-x{ float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--meta); }
  .appear-row{
    display:grid; grid-template-columns:1fr 1.3fr 1.3fr auto; gap:6px; margin-bottom:6px; align-items:center;
  }
  .appear-row input{
    font-family:inherit; font-size:12px; padding:7px 8px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:var(--card-bg); color:var(--ink);
  }
  .appear-row .appear-remove{
    background:none; border:none; color:var(--meta); cursor:pointer; font-size:14px; padding:2px 4px;
  }
  .appear-row .appear-remove:hover{ color:var(--red); }
  @media(max-width:560px){ .appear-row{ grid-template-columns:1fr; } }
  .merge-candidate{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 12px; border:1px solid var(--paper-line); border-radius:var(--radius);
    background:var(--card-bg); cursor:pointer; text-align:left;
  }
  .merge-candidate:hover{ border-color:var(--ink); background:var(--paper-deep); }
  .merge-candidate.selected{ border-color:var(--gold); background:var(--gold-bg); }
  .merge-candidate .mc-left{ display:flex; align-items:center; gap:10px; }
  .merge-candidate input[type="checkbox"]{ width:16px; height:16px; accent-color:var(--gold); flex:none; }
  .merge-candidate .mc-name{ font-weight:700; font-size:13px; }
  .merge-candidate .mc-same-badge{
    font-size:10px; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:1px 7px; margin-left:6px;
  }
  .merge-candidate .mc-meta{ font-size:11px; color:var(--meta); margin-top:2px; }
  .mc-thumb{
    width:56px; height:56px; flex:none; background:var(--paper-deep);
    border-radius:var(--radius); overflow:hidden; display:flex;
    align-items:center; justify-content:center; font-size:10px; color:var(--meta);
  }
  .mc-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .mc-thumb.big{ width:80px; height:80px; }
  .merge-source-preview{
    display:flex; align-items:center; gap:12px; background:var(--paper-deep);
    padding:10px 12px; border-radius:var(--radius); margin-bottom:12px;
    border:1px solid var(--paper-line);
  }
  .merge-source-preview .msp-meta{ flex:1; }
  .merge-source-preview .msp-name{ font-weight:700; font-size:13.5px; }
  .merge-source-preview .msp-sub{ font-size:11.5px; color:var(--meta); margin-top:2px; }

  /* Step 2 - 模式切換 */
  .merge-mode-tabs{
    display:flex; gap:0; margin-bottom:14px;
    border:1px solid var(--paper-line); border-radius:var(--radius); overflow:hidden;
    background:var(--card-bg);
  }
  .merge-mode-tab{
    flex:1; padding:9px 12px; text-align:center; cursor:pointer;
    background:transparent; border:none; font-family:inherit;
    font-size:12.5px; color:var(--ink-soft); position:relative;
    border-right:1px solid var(--paper-line);
  }
  .merge-mode-tab:last-child{ border-right:none; }
  .merge-mode-tab:hover{ background:var(--paper-deep); color:var(--ink); }
  .merge-mode-tab.active{
    background:var(--ink); color:#fff; font-weight:700;
  }
  .merge-mode-tab .mmt-hint{
    display:block; font-size:10.5px; font-weight:400; margin-top:2px; opacity:.85;
  }
  .merge-mode-desc{
    font-size:12px; color:var(--ink-soft); line-height:1.65;
    background:var(--paper-deep); padding:9px 11px; border-radius:var(--radius);
    margin-bottom:14px;
  }
  .merge-mode-desc b{ color:var(--ink); }

  /* Step 2 - 變體合併模式 */
  .merge-variant-list{ display:flex; flex-direction:column; gap:8px; }
  .merge-variant-row{
    display:flex; align-items:center; gap:10px; padding:10px;
    border:1px solid var(--paper-line); border-radius:var(--radius);
    background:var(--card-bg);
  }
  .merge-variant-row.is-main{
    border-color:var(--gold); background:var(--gold-bg);
    box-shadow:inset 3px 0 0 var(--gold);
  }
  .merge-variant-row .mvr-thumb{ width:50px; height:50px; flex:none; }
  .merge-variant-row .mvr-info{ flex:1; min-width:0; }
  .merge-variant-row .mvr-name{
    font-size:12.5px; font-weight:700; line-height:1.35;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .merge-variant-row .mvr-sub{ font-size:11px; color:var(--meta); margin-top:1px; }
  .merge-variant-row .mvr-controls{
    display:flex; flex-direction:column; gap:4px; flex:none; align-items:flex-end;
  }
  .merge-variant-row .mvr-main-radio{
    display:flex; align-items:center; gap:4px; font-size:11px; color:var(--meta); cursor:pointer;
  }
  .merge-variant-row.is-main .mvr-main-radio{ color:var(--gold); font-weight:700; }
  .merge-variant-row .mvr-label-input{
    font-family:inherit; font-size:12px; padding:5px 8px; width:160px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:#fff;
  }
  .merge-variant-name-edit{
    margin-bottom:12px; padding:10px 12px; background:var(--paper-deep);
    border-radius:var(--radius); border:1px solid var(--paper-line);
  }
  .merge-variant-name-edit label{
    display:block; font-size:11.5px; color:var(--ink-soft); margin-bottom:5px; font-weight:700;
  }
  .merge-variant-name-edit input{
    width:100%; font-family:inherit; font-size:13px; padding:6px 8px;
    border:1px solid var(--paper-line); border-radius:var(--radius); background:#fff;
  }

  /* 重複模式：欄位選項的縮圖 */
  .merge-field-opt .mfo-thumb{
    width:36px; height:36px; flex:none; background:var(--paper-deep);
    border-radius:2px; overflow:hidden; display:inline-flex;
    align-items:center; justify-content:center;
  }
  .merge-field-opt .mfo-thumb img{ width:100%; height:100%; object-fit:cover; }
  .merge-field-opt{ display:flex; align-items:flex-start; gap:8px; }

  /* ===== 出現紀錄反查 ===== */
  .appear-overview-search{
    margin-bottom:12px; width:100%;
  }
  .appear-overview-empty{
    font-size:12.5px; color:var(--meta); text-align:center; padding:24px 0;
  }
  .appear-group{
    margin-bottom:14px; border:1px solid var(--paper-line); border-radius:var(--radius);
    background:var(--card-bg); overflow:hidden;
  }
  .appear-group-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; background:var(--paper-deep); cursor:pointer;
    border-bottom:1px solid var(--paper-line);
  }
  .appear-group-head:hover{ background:var(--paper-line); }
  .appear-group-title{
    font-family:'Noto Serif TC', serif; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px;
  }
  .appear-group-title .agt-badge{
    font-size:10.5px; padding:2px 8px; border-radius:20px;
    background:var(--ink); color:#fff; font-family:'Noto Sans TC', sans-serif;
    font-variant-numeric:tabular-nums;
  }
  .appear-group-body{ padding:2px 0; }
  .appear-item{

    price: p.price || '',
    url: p.url || '',
    campaigns: p.tags || [],
    appearances: p.appearances || [],
    themeTags: p.themeTags || []
  };
  if(!v) return base;
  return {
    image: v.image || base.image,
    note: v.note || base.note,
    price: v.price || base.price,
    url: v.url || base.url,
    campaigns: (v.campaigns && v.campaigns.length) ? v.campaigns : base.campaigns,
    appearances: (v.appearances && v.appearances.length) ? v.appearances : base.appearances,
    themeTags: (v.themeTags && v.themeTags.length) ? v.themeTags : base.themeTags
  };
}

function allCampaignsOf(p){
  const set = new Set(p.tags || []);
  (p.variants || []).forEach(v => (v.campaigns || []).forEach(c => set.add(c)));
  return Array.from(set);
}

function allThemesOf(p){
  const set = new Set(p.themeTags || []);
  (p.variants || []).forEach(v => (v.themeTags || []).forEach(t => set.add(t)));
  return Array.from(set);
}

function allAppearancesOf(p){
  return [...(p.appearances || []), ...(p.variants || []).flatMap(v => v.appearances || [])];
}

function priceStats(p){
  const nums = [];
  if(p.price) { const n = parseNum(p.price); if(!isNaN(n)) nums.push(n); }
  (p.variants || []).forEach(v => {
    if(v.price){ const n = parseNum(v.price); if(!isNaN(n)) nums.push(n); }
  });
  if(nums.length === 0) return { min: NaN, max: NaN, hasRange: false };
  return { min: Math.min(...nums), max: Math.max(...nums), hasRange: Math.min(...nums) !== Math.max(...nums) };
}

function pickInitialVariant(p){
  const hasVariants = (p.variants || []).length > 0;
  if(!hasVariants) return -1;
  // 選了檔期
  if(activeCampaign !== 'all'){
    const i = p.variants.findIndex(v => (v.campaigns || []).includes(activeCampaign));
    if(i >= 0) return i;
  }
  // 選了主題
  if(activeThemeFilters.length){
    const i = p.variants.findIndex(v => (v.themeTags || []).some(t => activeThemeFilters.includes(t)));
    if(i >= 0) return i;
  }
  return 0;
}

function buildDetailHTML(p, vIdx){
  const variants = p.variants || [];
  const hasVariants = variants.length > 0;
  const stats = priceStats(p);

  // 主圖：優先用目前檢視版本的圖，沒有就用主商品圖
  const cur = (hasVariants && vIdx >= 0) ? resolveVariant(p, vIdx) : null;
  const heroImg = (cur && cur.image) || p.image || '';
  const imgHtml = heroImg
    ? `<img src="${escapeAttr(heroImg)}" alt="" onerror="this.parentElement.textContent='圖片無法載入'">`
    : '無圖片';

  const brands = p.brands || [];
  const brandLine = brands.length
    ? brands.map(b => escapeHtml(b)).join(' × ')
    : '<span class="detail-empty">未填品牌</span>';

  // 價格：目前版本的價 + 全系列區間
  const shownPrice = (cur && cur.price) || p.price || '';
  let priceLine = '';
  if(shownPrice){
    priceLine = `NT$ ${escapeHtml(shownPrice)}`;
    if(hasVariants && stats.hasRange){
      priceLine += `<span class="dp-range">全系列 NT$ ${stats.min.toLocaleString()} － ${stats.max.toLocaleString()}</span>`;
    }
  } else if(hasVariants && !isNaN(stats.min)){
    priceLine = stats.hasRange
      ? `NT$ ${stats.min.toLocaleString()} － ${stats.max.toLocaleString()}`
      : `NT$ ${stats.min.toLocaleString()}`;
  } else {
    priceLine = '<span class="detail-empty" style="font-size:13px;">未填售價</span>';
  }

  // 檔期與主題（詳情頁顯示商品的「全部」檔期／主題，不只當前版本）
  const campaignObjs = allCampaignsOf(p).map(tid => state.campaigns.find(c=>c.id===tid)).filter(Boolean);
  const themeObjs = allThemesOf(p).map(tid => state.themes.find(t=>t.id===tid)).filter(Boolean);
  const campaignHtml = campaignObjs.length
    ? `<div class="card-tags">${campaignObjs.map(t=>`<span class="tag-pill" style="background:${colorFor(t.name).hex}">${escapeHtml(t.name)}</span>`).join('')}</div>`
    : '<div class="detail-empty">未歸類任何檔期</div>';
  const themeHtml = themeObjs.length
    ? `<div class="card-tags">${themeObjs.map(t=>{const col=colorFor(t.name);return `<span class="theme-pill" style="border-color:${col.hex}; color:${col.hex};">${escapeHtml(t.name)}</span>`;}).join('')}</div>`
    : '<div class="detail-empty">未加上主題標籤</div>';

  // 規格切換 chips（放在 hero 區，切換後主圖／售價／備註跟著換）
  const switchHtml = hasVariants ? `<div class="detail-variant-switch">
      <div class="dvs-label">切換規格版本</div>
      ${variants.map((v,i) => `<button class="variant-chip ${i===vIdx?'active':''}" data-dvidx="${i}">
        <span>${escapeHtml(v.label || `版本 ${i+1}`)}</span>
        ${v.price ? `<span class="vc-price">${escapeHtml(v.price)}</span>` : ''}
      </button>`).join('')}
    </div>` : '';

  // 規格版本：全部列出，含各自的價格／備註／連結
  const variantHtml = hasVariants ? variants.map((v, i) => {
    const rv = resolveVariant(p, i);
    const isCur = i === vIdx;
    const vThumb = v.image
      ? `<img src="${escapeAttr(v.image)}" alt="" onerror="this.parentElement.textContent='無圖'">`
      : '無圖';
    return `<div class="detail-variant ${isCur?'is-cur':''}" data-dvidx="${i}" title="點此切換到這個版本">
      <div class="dv-thumb">${vThumb}</div>
      <div class="dv-body">
        <div class="dv-label">${escapeHtml(v.label || `版本 ${i+1}`)}${isCur?'<span style="font-size:10.5px; color:var(--meta); font-weight:400; margin-left:6px;">目前檢視</span>':''}</div>
        <div class="dv-price">${rv.price ? 'NT$ ' + escapeHtml(rv.price) : '（沿用主商品售價）'}</div>
        ${v.note ? `<div class="dv-note">${escapeHtml(v.note)}</div>` : ''}
        ${v.url ? `<a class="dv-link" href="${escapeAttr(v.url)}" target="_blank" rel="noopener">這個版本的連結 ↗</a>` : ''}
      </div>
    </div>`;
  }).join('') : '<div class="detail-empty">這件商品沒有分規格版本</div>';

  // 出現紀錄：完整列出，不折疊
  const apps = allAppearancesOf(p);
  const appearHtml = apps.length ? apps.map(a => {
    const site = a.site || '（未填站台）';
    const title = a.title || '（未填標題）';
    return `<div class="detail-appear">
      <span class="da-site">${escapeHtml(site)}</span>
      <span class="da-title">${escapeHtml(title)}${a.url?`<a href="${escapeAttr(a.url)}" target="_blank" rel="noopener">開文章 ↗</a>`:''}</span>
    </div>`;
  }).join('') : '<div class="detail-empty">尚未有任何出現紀錄</div>';

  const shownNote = (cur && cur.note) || p.note || '';
  const noteHtml = shownNote
    ? `<div class="detail-note">${escapeHtml(shownNote)}</div>`
    : '<div class="detail-empty">沒有備註</div>';

  let created = '';
  if(p.createdAt){
    const d = new Date(p.createdAt);
    if(!isNaN(d.getTime())){
      created = `加入於 ${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }
  }

  // 匯出分享頁時若選擇隱藏客戶資訊，這裡就不顯示客戶標記
  const hideClient = (typeof HIDE_CLIENT !== 'undefined') && HIDE_CLIENT;

  return `<div class="detail-hero">
      <div class="detail-img">${imgHtml}</div>
      <div class="detail-head">
        ${(p.isClient && !hideClient) ? '<div class="detail-client-badge">🚩 客戶商品</div>' : ''}
        <div class="detail-name">${escapeHtml(p.name)}</div>
        <div class="detail-brand">${brandLine}</div>
        <div class="detail-price">${priceLine}</div>
        ${(cur && cur.url) || p.url ? `<a class="detail-link" href="${escapeAttr((cur && cur.url) || p.url)}" target="_blank" rel="noopener">前往商品頁 ↗</a>` : ''}
        ${switchHtml}
      </div>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-label">所屬檔期</div>
      ${campaignHtml}
    </div>
    <div class="detail-sec">
      <div class="detail-sec-label">主題標籤</div>
      ${themeHtml}
    </div>
    <div class="detail-sec">
      <div class="detail-sec-label">規格版本${hasVariants?`（${variants.length}）`:''}</div>
      ${variantHtml}
    </div>
    <div class="detail-sec">
      <div class="detail-sec-label">備註</div>
      ${noteHtml}
    </div>
    <div class="detail-sec">
      <div class="detail-sec-label">出現紀錄${apps.length?`（${apps.length} 筆）`:''}</div>
      ${appearHtml}
    </div>
    ${created ? `<div class="detail-meta-foot">${created}</div>` : ''}`;
}

function sOpenDetail(id, vIdx){
  const p = state.products.find(x => x.id === id);
  if(!p) return;
  const dov = document.getElementById('detailOverlay');
  dov.dataset.pid = id;
  document.getElementById('detailBody').innerHTML = buildDetailHTML(p, typeof vIdx === 'number' ? vIdx : -1);
  dov.style.display = 'flex';
}

function sUpdateChips(){
  const bc = document.getElementById('brandFilterChip');
  if(brandFilter){ bc.style.display='inline-block'; bc.textContent = '品牌：' + brandFilter + ' ✕'; } else { bc.style.display='none'; }
  const ac = document.getElementById('appearFilterChip');
  if(appearanceFilter){ ac.style.display='inline-block'; ac.textContent = appearanceFilter.type==='site' ? ('📋 ' + appearanceFilter.site + ' ✕') : ('📋 ' + appearanceFilter.site + ' － ' + appearanceFilter.title + ' ✕'); } else { ac.style.display='none'; }
}

function sRenderTabs(){
  const list = document.getElementById('tabList');
  const counts = {};
  state.products.forEach(p => allCampaignsOf(p).forEach(t => counts[t] = (counts[t]||0)+1));
  let html = `<div class="tab ${activeCampaign==='all'?'active':''}" data-c="all"><span class="dot" style="background:var(--ink-soft)"></span><span class="name">全部</span><span class="cnt">${state.products.length}</span></div>`;
  state.campaigns.forEach(c => { const col = colorFor(c.name); html += `<div class="tab ${activeCampaign===c.id?'active':''}" data-c="${c.id}"><span class="dot" style="background:${col.var}"></span><span class="name">${escapeHtml(c.name)}</span><span class="cnt">${counts[c.id]||0}</span></div>`; });
  list.innerHTML = html;
}

function sRenderThemes(){
  const wrap = document.getElementById('themeFilterList');
  if(!state.themes.length){ wrap.innerHTML = '<span style="font-size:11px; color:var(--meta);">沒有主題標籤</span>'; return; }
  wrap.innerHTML = state.themes.map(t => { const col = colorFor(t.name); const active = activeThemeFilters.includes(t.id); return `<span class="theme-chip ${active?'active':''}" data-tid="${t.id}" style="${active?`background:${col.hex}`:''}">${escapeHtml(t.name)}</span>`; }).join('');
}

function sRenderCard(p, vIdx){
  const hasVariants = (p.variants || []).length > 0;
  const useVariant = hasVariants && vIdx >= 0;
  const r = useVariant ? resolveVariant(p, vIdx) : { image:p.image||'', note:p.note||'', price:p.price||'', url:p.url||'', campaigns:p.tags||[], appearances:p.appearances||[], themeTags:p.themeTags||[] };
  const campaignTags = r.campaigns.map(tid => state.campaigns.find(c=>c.id===tid)).filter(Boolean);
  const themeTagObjs = r.themeTags.map(tid => state.themes.find(t=>t.id===tid)).filter(Boolean);
  const topBar = campaignTags.length ? campaignTags.map(t=>`<span style="background:${colorFor(t.name).hex}"></span>`).join('') : `<span style="background:var(--paper-line)"></span>`;
  const img = r.image ? `<img src="${escapeAttr(r.image)}" alt="" onerror="this.parentElement.innerHTML='圖片無法載入'">` : '無圖片';
  const brands = p.brands || [];
  let brandHtml = '';
  if(brands.length){
    if(brands.length <= 3){ brandHtml = brands.map(b => `<span class="brand-item" data-brand="${escapeAttr(b)}" title="只看這個品牌">${escapeHtml(b)}</span>`).join('<span class="brand-sep">×</span>'); }
    else { const shown = brands.slice(0,2); brandHtml = shown.map(b => `<span class="brand-item" data-brand="${escapeAttr(b)}" title="只看這個品牌">${escapeHtml(b)}</span>`).join('<span class="brand-sep">×</span>') + `<span class="brand-more" title="${escapeAttr(brands.slice(2).join('、'))}">+${brands.length-2}</span>`; }
  }
  const stats = priceStats(p);
  let priceHtml = '';
  if(r.price){ priceHtml = `NT$ ${escapeHtml(r.price)}`; if(hasVariants && stats.hasRange){ priceHtml += `<span class="price-suffix">・全系列 NT$ ${stats.min.toLocaleString()} 起</span>`; } }
  else if(hasVariants && !isNaN(stats.min)){ priceHtml = `NT$ ${stats.min.toLocaleString()} 起`; }
  const variantHtml = hasVariants ? `<div class="variant-row"><div class="variant-row-label">共 ${p.variants.length} 種版本</div>${p.variants.map((v,i)=>`<button class="variant-chip ${i===vIdx?'active':''}" data-vidx="${i}"><span>${escapeHtml(v.label||`版本 ${i+1}`)}</span>${v.price?`<span class="vc-price">${escapeHtml(v.price)}</span>`:''}</button>`).join('')}</div>` : '';
  const appearances = r.appearances;
  const shownAppear = appearances.slice(0,3);
  const appearHtml = appearances.length ? `<div class="appear-list"><div class="appear-count-label">出現紀錄・共 ${appearances.length} 筆</div>${shownAppear.map(a=>{ const label=[a.site,a.title].filter(Boolean).join(' － ')||a.url||'未命名紀錄'; return a.url?`<div class="appear-list-item"><a href="${escapeAttr(a.url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a></div>`:`<div class="appear-list-item">${escapeHtml(label)}</div>`; }).join('')}${appearances.length>3?`<div class="appear-more">還有 ${appearances.length-3} 筆</div>`:''}</div>` : '';
  const hideC = (typeof HIDE_CLIENT !== 'undefined') && HIDE_CLIENT;
  const showClient = p.isClient && !hideC;
  return `<div class="card ${showClient?'is-client':''}" data-id="${p.id}" data-vidx="${vIdx}">${showClient?'<div class="client-ribbon">客戶商品</div>':''}<div class="card-top">${topBar}</div><div class="card-img note-fade clickable" data-detail="${p.id}" title="查看完整資訊">${img}</div><div class="card-body"><div class="card-name clickable" data-detail="${p.id}" title="查看完整資訊">${escapeHtml(p.name)}</div>${brandHtml?`<div class="card-brand">${brandHtml}</div>`:''}${priceHtml?`<div class="card-price">${priceHtml}</div>`:''}${variantHtml}<div class="card-tags">${campaignTags.map(t=>`<span class="tag-pill" style="background:${colorFor(t.name).hex}">${escapeHtml(t.name)}</span>`).join('')}</div>${themeTagObjs.length?`<div class="card-tags">${themeTagObjs.map(t=>{const col=colorFor(t.name);return `<span class="theme-pill" style="border-color:${col.hex}; color:${col.hex};">${escapeHtml(t.name)}</span>`;}).join('')}</div>`:''}${r.note?`<div class="card-note note-fade">${escapeHtml(r.note)}</div>`:''}${appearHtml}<div class="card-foot"><div style="display:flex; align-items:center; gap:6px;">${appearances.length?`<span class="appear-count-badge" title="出現紀錄筆數">${appearances.length}</span>`:''}</div><div class="card-actions">${r.url?`<a class="link-btn" href="${escapeAttr(r.url)}" target="_blank" rel="noopener">連結 ↗</a>`:''}</div></div></div></div>`;
}

function sRenderGrid(){
  const grid = document.getElementById('grid');
  let items = state.products.filter(p => {
    if(activeCampaign!=='all' && !allCampaignsOf(p).includes(activeCampaign)) return false;
    if(clientOnly && !p.isClient) return false;
    if(activeThemeFilters.length && !allThemesOf(p).some(t=>activeThemeFilters.includes(t))) return false;
    if(brandFilter && !(p.brands||[]).some(b => b === brandFilter)) return false;
    if(appearanceFilter){ const apps = allAppearancesOf(p); if(appearanceFilter.type==='site'){ if(!apps.some(a=>(a.site||'')===appearanceFilter.site)) return false; } else if(appearanceFilter.type==='article'){ if(!apps.some(a=>(a.site||'')===appearanceFilter.site && (a.title||'')===appearanceFilter.title)) return false; } }
    if(appearFilter!=='all'){ const cnt=allAppearancesOf(p).length; if(appearFilter==='none'&&cnt!==0) return false; if(appearFilter==='1-3'&&!(cnt>=1&&cnt<=3)) return false; if(appearFilter==='3-5'&&!(cnt>=4&&cnt<=5)) return false; if(appearFilter==='5-10'&&!(cnt>=6&&cnt<=10)) return false; if(appearFilter==='10plus'&&cnt<11) return false; }
    if(priceMin!=null || priceMax!=null){ const stats=priceStats(p); if(isNaN(stats.min)) return false; const allNums=[]; if(p.price){const n=parseNum(p.price); if(!isNaN(n)) allNums.push(n);} (p.variants||[]).forEach(v=>{if(v.price){const n=parseNum(v.price); if(!isNaN(n)) allNums.push(n);}}); const anyMatch=allNums.some(n=>(priceMin==null||n>=priceMin)&&(priceMax==null||n<=priceMax)); if(!anyMatch) return false; }
    if(searchTerm){ const s=searchTerm.toLowerCase(); const brandStr=(p.brands||[]).join(' '); const variantStr=(p.variants||[]).map(v=>`${v.label||''} ${v.note||''}`).join(' '); const appearStr=allAppearancesOf(p).map(a=>`${a.site||''} ${a.title||''}`).join(' '); const hay=`${p.name} ${brandStr} ${p.note||''} ${variantStr} ${appearStr}`.toLowerCase(); if(!hay.includes(s)) return false; }
    return true;
  }).sort((a,b) => {
    if(sortMode==='name') return a.name.localeCompare(b.name,'zh-Hant');
    if(sortMode==='price-asc'||sortMode==='price-desc'){ const va=priceStats(a).min, vb=priceStats(b).min; const ae=isNaN(va), be=isNaN(vb); if(ae&&be) return 0; if(ae) return 1; if(be) return -1; return sortMode==='price-asc'?va-vb:vb-va; }
    if(sortMode==='appear-desc'||sortMode==='appear-asc'){ const ca=allAppearancesOf(a).length, cb=allAppearancesOf(b).length; if(ca===cb) return (b.createdAt||0)-(a.createdAt||0); return sortMode==='appear-desc'?cb-ca:ca-cb; }
    return (b.createdAt||0)-(a.createdAt||0);
  });
  if(!items.length){ grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><b>沒有符合條件的商品</b>試試清除搜尋或篩選條件。</div>'; return; }
  grid.innerHTML = items.map(p => sRenderCard(p, pickInitialVariant(p))).join('');
}

function sCollectAppearIndex(){
  const idx = {};
  state.products.forEach(p => { allAppearancesOf(p).forEach(a => { const site=(a.site||'（未填站台）').trim(); const title=(a.title||'（未填標題）').trim(); const url=(a.url||'').trim(); if(!idx[site]) idx[site]={titles:{},allProductIds:new Set()}; if(!idx[site].titles[title]) idx[site].titles[title]={productIds:new Set(),url}; if(url&&!idx[site].titles[title].url) idx[site].titles[title].url=url; idx[site].titles[title].productIds.add(p.id); idx[site].allProductIds.add(p.id); }); });
  return idx;
}

function sRenderAppearOverview(term){
  const list = document.getElementById('appearOverviewList');
  const idx = sCollectAppearIndex();
  const sites = Object.keys(idx).sort((a,b)=>idx[b].allProductIds.size-idx[a].allProductIds.size);
  const s = (term||'').toLowerCase();
  const groups = sites.map(site => { const titles=Object.keys(idx[site].titles).sort((a,b)=>idx[site].titles[b].productIds.size-idx[site].titles[a].productIds.size); const ft=s?titles.filter(t=>t.toLowerCase().includes(s)||site.toLowerCase().includes(s)):titles; if(s&&ft.length===0&&!site.toLowerCase().includes(s)) return null; return {site,titles:ft.length?ft:titles,siteCount:idx[site].allProductIds.size,idx}; }).filter(Boolean);
  if(!groups.length){ list.innerHTML = '<div class="appear-overview-empty">沒有任何出現紀錄。</div>'; return; }
  list.innerHTML = groups.map(g => `<div class="appear-group"><div class="appear-group-head" data-site="${escapeAttr(g.site)}" data-action="filter-site"><div class="appear-group-title">${escapeHtml(g.site)}<span class="agt-badge">${g.siteCount}</span></div><div style="font-size:10.5px; color:var(--meta);">點站台名 → 篩選整個站台</div></div><div class="appear-group-body">${g.titles.map(t=>{ const info=g.idx[g.site].titles[t]; const count=info.productIds.size; return `<div class="appear-item" data-site="${escapeAttr(g.site)}" data-title="${escapeAttr(t)}" data-action="filter-article"><div class="appear-item-title">${escapeHtml(t)}${info.url?`<a href="${escapeAttr(info.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation();">開文章 ↗</a>`:''}</div><div class="appear-item-count">${count} 個商品</div></div>`; }).join('')}</div></div>`).join('');
}

function sRenderAll(){
  sRenderTabs(); sRenderThemes(); sRenderGrid();
  const tc = document.getElementById('totalCount');
  if(tc) tc.textContent = '共 ' + state.products.length + ' 件';
}

function sBind(){
  const dov = document.getElementById('detailOverlay');
  document.getElementById('closeDetailBtn').addEventListener('click', () => { dov.style.display='none'; });
  dov.addEventListener('click', e => { if(e.target.id==='detailOverlay') dov.style.display='none'; });
  document.addEventListener('keydown', e => { if(e.key==='Escape') dov.style.display='none'; });
  document.getElementById('detailBody').addEventListener('click', e => {
    const sw = e.target.closest('[data-dvidx]');
    if(!sw || e.target.closest('a')) return;
    sOpenDetail(dov.dataset.pid, parseInt(sw.dataset.dvidx,10));
  });
  document.getElementById('tabList').addEventListener('click', e => { const tab=e.target.closest('.tab'); if(!tab) return; activeCampaign=tab.dataset.c; sRenderAll(); });
  document.getElementById('themeFilterList').addEventListener('click', e => { const chip=e.target.closest('.theme-chip'); if(!chip) return; const tid=chip.dataset.tid; if(activeThemeFilters.includes(tid)) activeThemeFilters=activeThemeFilters.filter(t=>t!==tid); else activeThemeFilters.push(tid); sRenderThemes(); sRenderGrid(); });
  const grid = document.getElementById('grid');
  grid.addEventListener('click', e => {
    const det = e.target.closest('[data-detail]');
    if(det){ const card=det.closest('.card'); const vi=card?parseInt(card.dataset.vidx,10):-1; sOpenDetail(det.dataset.detail, isNaN(vi)?-1:vi); return; }
    const vchip = e.target.closest('.variant-chip');
    if(vchip){ const card=vchip.closest('.card'); const p=state.products.find(x=>x.id===card.dataset.id); const idx=parseInt(vchip.dataset.vidx,10); const tmp=document.createElement('template'); tmp.innerHTML=sRenderCard(p,idx).trim(); card.replaceWith(tmp.content.firstElementChild); return; }
    const brand = e.target.closest('.brand-item');
    if(brand){ brandFilter=brand.dataset.brand; sUpdateChips(); sRenderGrid(); return; }
  });
  document.getElementById('searchBox').addEventListener('input', e => { searchTerm=e.target.value.trim(); sRenderGrid(); });
  document.getElementById('priceMinInput').addEventListener('input', e => { const v=e.target.value.trim(); priceMin=v===''?null:parseInt(v,10); sRenderGrid(); });
  document.getElementById('priceMaxInput').addEventListener('input', e => { const v=e.target.value.trim(); priceMax=v===''?null:parseInt(v,10); sRenderGrid(); });
  document.getElementById('appearFilter').addEventListener('change', e => { appearFilter=e.target.value; sRenderGrid(); });
  document.getElementById('sortSelect').addEventListener('change', e => { sortMode=e.target.value; sRenderGrid(); });
  const co = document.getElementById('clientOnlyChip');
  if(co) co.addEventListener('click', () => { clientOnly=!clientOnly; co.classList.toggle('active', clientOnly); sRenderGrid(); });
  document.getElementById('brandFilterChip').addEventListener('click', () => { brandFilter=null; sUpdateChips(); sRenderGrid(); });
  document.getElementById('appearFilterChip').addEventListener('click', () => { appearanceFilter=null; sUpdateChips(); sRenderGrid(); });
  const ov = document.getElementById('appearOverviewOverlay');
  document.getElementById('appearOverviewChip').addEventListener('click', () => { document.getElementById('appearOverviewSearch').value=''; sRenderAppearOverview(''); ov.style.display='flex'; });
  document.getElementById('closeAppearOverviewBtn').addEventListener('click', () => { ov.style.display='none'; });
  ov.addEventListener('click', e => { if(e.target.id==='appearOverviewOverlay') ov.style.display='none'; });
  document.getElementById('appearOverviewSearch').addEventListener('input', e => sRenderAppearOverview(e.target.value));
  document.getElementById('appearOverviewList').addEventListener('click', e => { const el=e.target.closest('[data-action]'); if(!el) return; if(el.dataset.action==='filter-site'){ appearanceFilter={type:'site',site:el.dataset.site}; } else { appearanceFilter={type:'article',site:el.dataset.site,title:el.dataset.title}; } sUpdateChips(); ov.style.display='none'; sRenderGrid(); });
}
sBind(); sRenderAll();
</script>
</body>
</html>
